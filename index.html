<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성경 암송 60구절</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;padding:1.5rem;transition:background .2s,color .2s;}

body.light{background:#f5f5f0;color:#1a1a1a;}
body.light .verse-row{background:#fff;border-color:#e0e0d8;}
body.light .vinput{background:#fff;color:#1a1a1a;border-color:#ddd;}
body.light .vinput.correct{background:#E1F5EE;border-color:#1D9E75;}
body.light .vinput.wrong{background:#fff5f5;border-color:#E24B4A;}
body.light .vbtn{background:#fff;color:#333;border-color:#ccc;}
body.light .vbtn:hover{background:#f0f0ec;}
body.light .eyebtn{background:#fff;color:#555;border-color:#ccc;}
body.light .eyebtn:hover{background:#f0f0ec;}
body.light .eyebtn.on{background:#E6F1FB;color:#185FA5;border-color:#85B7EB;}
body.light .vnum{color:#999;}
body.light .vfeedback{border-top-color:#f0f0ec;}
body.light .vrevealed{background:#f9f6ee;border-top-color:#e8e0c8;color:#3a3020;}
body.light .ctrl-bar{background:#e8e8e2;border-color:#d0d0c8;}
body.light .ctrl-label{color:#666;}
body.light .ctrl-label.sel{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.1);}
body.light h1{color:#1a1a1a;}
body.light .del{background:#FCEBEB;color:#c0392b;text-decoration:line-through;border-radius:3px;padding:0 3px;}
body.light .ins{background:#E1F5EE;color:#0F6E56;border-radius:3px;padding:0 3px;font-weight:500;}
body.light .ok-ch{color:#1a1a1a;}
body.light .tip{background:#eee;color:#888;}
body.light .tip b{color:#333;}
body.light .global-eye{background:#fff;color:#555;border-color:#ccc;}
body.light .global-eye:hover{background:#f0f0ec;}
body.light .global-eye.on{background:#E6F1FB;color:#185FA5;border-color:#85B7EB;}
body.light .range-bar{background:#e8e8e2;border-color:#d0d0c8;}
body.light .rbtn{color:#666;border-color:transparent;}
body.light .rbtn:hover{background:rgba(0,0,0,.06);}
body.light .rbtn.sel{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.1);}
body.light .rbtn .rbot{color:rgba(0,0,0,.38);}
body.light .rbtn.sel .rbot{color:rgba(0,0,0,.5);}
body.light .rbtn .rbot .done-num{color:#1D9E75;}
body.light .rbtn .rbot .try-num{color:rgba(0,0,0,.45);}

body.dark{background:#181818;color:#e0e0da;}
body.dark .verse-row{background:#222;border-color:#333;}
body.dark .vinput{background:#2a2a2a;color:#e0e0da;border-color:#3a3a3a;}
body.dark .vinput:focus{border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.2);}
body.dark .vinput.correct{background:#0b2d1e;border-color:#1D9E75;}
body.dark .vinput.wrong{background:#2d0b0b;border-color:#c0392b;}
body.dark .vbtn{background:#2a2a2a;color:#bbb;border-color:#3a3a3a;}
body.dark .vbtn:hover{background:#333;}
body.dark .eyebtn{background:#2a2a2a;color:#888;border-color:#3a3a3a;}
body.dark .eyebtn:hover{background:#333;}
body.dark .eyebtn.on{background:#0c2a42;color:#85B7EB;border-color:#185FA5;}
body.dark .vnum{color:#555;}
body.dark .vfeedback{border-top-color:#2a2a2a;}
body.dark .vrevealed{background:#1e1c14;border-top-color:#3a3520;color:#c8c09a;}
body.dark .vstatus.ok{background:#0b2d1e;color:#5DCAA5;}
body.dark .vstatus.ng{background:#2d0b0b;color:#e88;}
body.dark .del{background:#3a1212;color:#e88;text-decoration:line-through;border-radius:3px;padding:0 3px;}
body.dark .ins{background:#0b2d1e;color:#5DCAA5;border-radius:3px;padding:0 3px;font-weight:500;}
body.dark .ok-ch{color:#e0e0da;}
body.dark h1{color:#e0e0da;}
body.dark .ctrl-bar{background:#222;border-color:#333;}
body.dark .ctrl-label{color:#666;}
body.dark .ctrl-label.sel{background:#333;color:#e0e0da;}
body.dark .tip{background:#222;color:#777;}
body.dark .tip b{color:#aaa;}
body.dark .global-eye{background:#2a2a2a;color:#888;border-color:#3a3a3a;}
body.dark .global-eye:hover{background:#333;}
body.dark .global-eye.on{background:#0c2a42;color:#85B7EB;border-color:#185FA5;}
body.dark .range-bar{background:#222;border-color:#333;}
body.dark .rbtn{color:#666;border-color:transparent;}
body.dark .rbtn:hover{background:rgba(255,255,255,.06);}
body.dark .rbtn.sel{background:#333;color:#e0e0da;}
body.dark .rbtn .rbot{color:rgba(255,255,255,.28);}
body.dark .rbtn.sel .rbot{color:rgba(255,255,255,.45);}
body.dark .rbtn .rbot .done-num{color:#5DCAA5;}
body.dark .rbtn .rbot .try-num{color:rgba(255,255,255,.35);}

#wrap{max-width:720px;margin:0 auto;}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.ctrl-bar{display:inline-flex;align-items:center;gap:4px;padding:4px;border-radius:10px;border:1px solid;}
.ctrl-radio{display:none;}
.ctrl-label{font-size:13px;cursor:pointer;padding:5px 14px;border-radius:7px;transition:background .12s;user-select:none;}
.global-eye{font-size:13px;cursor:pointer;padding:5px 12px;border-radius:7px;border:1px solid;transition:background .12s;display:inline-flex;align-items:center;gap:5px;user-select:none;}
.range-bar{display:flex;align-items:center;gap:4px;padding:4px;border-radius:10px;border:1px solid;margin-bottom:1.2rem;flex-wrap:wrap;}
.rbtn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:5px 11px;border-radius:7px;border:1px solid transparent;transition:background .12s;user-select:none;min-width:52px;}
.rbtn .rtop{font-size:13px;font-weight:500;line-height:1.4;}
.rbtn .rbot{font-size:11px;line-height:1.4;margin-top:1px;display:flex;gap:5px;align-items:center;}
.rbtn .rbot .done-num{font-weight:600;}
.rbtn .rbot .sep{opacity:.3;font-size:10px;}
.top{display:flex;align-items:center;gap:16px;margin-bottom:1rem;flex-wrap:wrap;}
h1{font-size:20px;font-weight:600;flex:1;}
.tip{font-size:12px;border-radius:8px;padding:6px 14px;margin-bottom:1.2rem;}
.verse-row{border-radius:12px;border:1px solid;margin-bottom:10px;overflow:hidden;}
.verse-row.hidden{display:none;}
.verse-header{display:flex;align-items:center;gap:8px;padding:10px 14px;}
.vnum{font-size:13px;font-weight:600;min-width:26px;}
.vinput{flex:1;font-size:14px;padding:7px 10px;border-radius:8px;border:1px solid;font-family:inherit;outline:none;transition:border-color .15s,background .15s;}
.vbtn{font-size:13px;padding:7px 14px;border-radius:8px;border:1px solid;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .12s;}
.vbtn:active{transform:scale(.97);}
.eyebtn{font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid;cursor:pointer;line-height:1;transition:background .12s;}
.eyebtn:active{transform:scale(.97);}
.vstatus{font-size:12px;padding:3px 8px;border-radius:20px;white-space:nowrap;font-weight:500;}
.vstatus.ok{background:#E1F5EE;color:#085041;}
.vstatus.ng{background:#FCEBEB;color:#791F1F;}
.vfeedback{padding:10px 14px 14px 48px;font-size:13px;line-height:2.1;display:none;word-break:keep-all;border-top:1px solid;}
.vfeedback.show{display:block;}
.vrevealed{padding:10px 14px 12px 48px;font-size:13px;line-height:1.9;display:none;word-break:keep-all;border-top:1px solid;}
.vrevealed.show{display:block;}
.vrevealed strong{font-weight:600;display:block;margin-bottom:2px;}
.eye-icon{width:16px;height:16px;display:inline-block;vertical-align:middle;}
</style>
</head>
<body class="light">
<div id="wrap">
  <div class="topbar">
    <div class="ctrl-bar">
      <input type="radio" name="mode" id="mLight" class="ctrl-radio" checked>
      <label for="mLight" class="ctrl-label sel" id="lLight" onclick="setMode('light')">라이트</label>
      <input type="radio" name="mode" id="mDark" class="ctrl-radio">
      <label for="mDark" class="ctrl-label" id="lDark" onclick="setMode('dark')">다크</label>
    </div>
    <div class="ctrl-bar">
      <input type="radio" name="rmode" id="rmSeq" class="ctrl-radio" checked>
      <label for="rmSeq" class="ctrl-label sel" id="lSeq" onclick="setRandMode(false)">순서</label>
      <input type="radio" name="rmode" id="rmRand" class="ctrl-radio">
      <label for="rmRand" class="ctrl-label" id="lRand" onclick="setRandMode(true)">랜덤</label>
    </div>
    <button class="global-eye" id="globalEye" onclick="toggleAllReveal()">
      <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      전체 보기
    </button>
  </div>

  <div class="range-bar" style="margin-bottom:1.2rem;display:flex;align-items:center;gap:4px;flex-wrap:wrap;">
    <span style="font-size:11px;white-space:nowrap;opacity:.5;padding:4px 8px 4px 4px;flex-shrink:0;border-right:1px solid rgba(128,128,128,.2);margin-right:2px;">&#x2713;&nbsp;완료&nbsp;&#x21BA;&nbsp;시도</span>
    <div id="rangeBar" style="display:contents;"></div>
  </div>

  <div class="top"><h1>성경 암송 60구절</h1></div>
  <div class="tip">구절+본문 입력 예) <b>에베소서 4:13 우리가 다 하나님의...</b> &nbsp;|&nbsp; 엔터 또는 확인으로 채점 &nbsp;|&nbsp; 띄어쓰기 무시</div>
  <div id="list"></div>
</div>

<script>
const V=[
{r:"에베소서 4:13",t:"우리가 다 하나님의 아들을 믿는 것과 아는 일에 하나가 되어 온전한 사람을 이루어 그리스도의 장성한 분량이 충만한 데까지 이르리니"},
{r:"마태복음 4:19",t:"말씀하시되 나를 따라오라 내가 너희를 사람을 낚는 어부가 되게 하리라 하시니"},
{r:"마태복음 5:16",t:"이같이 너희 빛이 사람 앞에 비치게 하여 그들로 너희 착한 행실을 보고 하늘에 계신 너희 아버지께 영광을 돌리게 하라"},
{r:"마태복음 6:33",t:"그런즉 너희는 먼저 그의 나라와 그의 의를 구하라 그리하면 이 모든 것을 너희에게 더하시리라"},
{r:"마태복음 9:35",t:"예수께서 모든 도시와 마을에 두루 다니사 그들의 회당에서 가르치시며 천국 복음을 전파하시며 모든 병과 모든 약한 것을 고치시니라"},
{r:"마태복음 10:16",t:"보라 내가 너희를 보냄이 양을 이리 가운데로 보냄과 같도다 그러므로 너희는 뱀 같이 지혜롭고 비둘기 같이 순결하라"},
{r:"마태복음 10:32-33",t:"누구든지 사람 앞에서 나를 시인하면 나도 하늘에 계신 내 아버지 앞에서 그를 시인할 것이요 누구든지 사람 앞에서 나를 부인하면 나도 하늘에 계신 내 아버지 앞에서 그를 부인하리라"},
{r:"마태복음 11:29-30",t:"나는 마음이 온유하고 겸손하니 나의 멍에를 메고 내게 배우라 그리하면 너희 마음이 쉼을 얻으리니 이는 내 멍에는 쉽고 내 짐은 가벼움이라 하시니라"},
{r:"마태복음 14:23",t:"무리를 보내신 후에 기도하러 따로 산에 올라가시니라 저물매 거기 혼자 계시더니"},
{r:"마태복음 16:19",t:"내가 천국 열쇠를 네게 주리니 네가 땅에서 무엇이든지 매면 하늘에서도 매일 것이요 네가 땅에서 무엇이든지 풀면 하늘에서도 풀리리라 하시고"},
{r:"마태복음 16:24-25",t:"이에 예수께서 제자들에게 이르시되 누구든지 나를 따라오려거든 자기를 부인하고 자기 십자가를 지고 나를 따를 것이니라 누구든지 제 목숨을 구원하고자 하면 잃을 것이요 누구든지 나를 위하여 제 목숨을 잃으면 찾으리라"},
{r:"마태복음 18:19",t:"진실로 다시 너희에게 이르노니 너희 중의 두 사람이 땅에서 합심하여 무엇이든지 구하면 하늘에 계신 내 아버지께서 그들을 위하여 이루게 하시리라"},
{r:"마태복음 19:26",t:"예수께서 그들을 보시며 이르시되 사람으로는 할 수 없으나 하나님으로서는 다 하실 수 있느니라"},
{r:"마태복음 20:28",t:"인자가 온 것은 섬김을 받으려 함이 아니라 도리어 섬기려 하고 자기 목숨을 많은 사람의 대속물로 주려 함이니라"},
{r:"마태복음 21:22",t:"너희가 기도할 때에 무엇이든지 믿고 구하는 것은 다 받으리라 하시니라"},
{r:"마태복음 24:45",t:"충성되고 지혜 있는 종이 되어 주인에게 그 집 사람들을 맡아 때를 따라 양식을 나눠줄 자가 누구냐"},
{r:"마태복음 25:40",t:"임금이 대답하여 이르시되 내가 진실로 너희에게 이르노니 너희가 여기 내 형제 중에 지극히 작은 자 하나에게 한 것이 곧 내게 한 것이니라 하시고"},
{r:"마태복음 28:18-20",t:"예수께서 나아와 말씀하여 이르시되 하늘과 땅의 모든 권세를 내게 주셨으니 그러므로 너희는 가서 모든 민족을 제자로 삼아 아버지와 아들과 성령의 이름으로 세례를 베풀고 내가 너희에게 분부한 모든 것을 가르쳐 지키게 하라 볼지어다 내가 세상 끝날까지 너희와 항상 함께 있으리라 하시니라"},
{r:"이사야 52:7",t:"좋은 소식을 전하며 평화를 공포하며 복된 좋은 소식을 가져오며 구원을 공포하며 시온을 향하여 이르기를 네 하나님이 통치하신다 하는 자의 산을 넘는 발이 어찌 그리 아름다운가"},
{r:"예레미야 29:11",t:"여호와의 말씀이니라 너희를 향한 나의 생각을 아나니 평안이요 재앙이 아니니라 너희에게 미래와 희망을 주는 것이니라"},
{r:"호세아 6:6",t:"나는 인애를 원하고 제사를 원하지 아니하며 번제보다 하나님을 아는 것을 원하노라"},
{r:"에베소서 5:8",t:"너희가 전에는 어둠이더니 이제는 주 안에서 빛이라 빛의 자녀들처럼 행하라"},
{r:"이사야 61:1",t:"주 여호와의 영이 내게 내리셨으니 이는 여호와께서 내게 기름을 부으사 가난한 자에게 아름다운 소식을 전하게 하려 하심이라 나를 보내사 마음이 상한 자를 고치며 포로된 자에게 자유를 갇힌 자에게 놓임을 선포하며"},
{r:"에베소서 6:12",t:"우리의 씨름은 혈과 육을 상대하는 것이 아니요 통치자들과 권세들과 이 어둠의 세상 주관자들과 하늘에 있는 악의 영들을 상대함이라"},
{r:"이사야 26:3",t:"주께서 심지가 견고한 자를 평강하고 평강하도록 지키시리니 이는 그가 주를 신뢰함이니이다"},
{r:"에베소서 4:29",t:"무릇 더러운 말은 너희 입 밖에도 내지 말고 오직 덕을 세우는 데 소용되는 대로 선한 말을 하여 듣는 자들에게 은혜를 끼치게 하라"},
{r:"고린도전서 10:31",t:"그런즉 너희가 먹든지 마시든지 무엇을 하든지 다 하나님의 영광을 위하여 하라"},
{r:"시편 46:10",t:"이르시기를 너희는 가만히 있어 내가 하나님 됨을 알지어다 내가 뭇 나라 중에서 높임을 받으리라 내가 세계 중에서 높임을 받으리라 하시도다"},
{r:"시편 27:1",t:"여호와는 나의 빛이요 나의 구원이시니 내가 누구를 두려워하리요 여호와는 내 생명의 능력이시니 내가 누구를 무서워하리요"},
{r:"고린도전서 4:20",t:"하나님의 나라는 말에 있지 아니하고 오직 능력에 있음이라"},
{r:"이사야 40:31",t:"오직 여호와를 앙망하는 자는 새 힘을 얻으리니 독수리가 날개치며 올라감 같을 것이요 달음박질하여도 곤비하지 아니하겠고 걸어가도 피곤하지 아니하리로다"},
{r:"야고보서 4:7",t:"그런즉 너희는 하나님께 복종할지어다 마귀를 대적하라 그리하면 너희를 피하리라"},
{r:"잠언 13:20",t:"지혜로운 자와 동행하면 지혜를 얻고 미련한 자와 사귀면 해를 받느니라"},

// 정답 토큰화: 공백으로 쪼갬 (정답은 올바른 단어 경계)
function tokenizeAns(s){ return s.trim().split(/\s+/).filter(Boolean); }

// 입력 재토큰화: 전체 공백 제거 후 정답 토큰 길이 순서대로 슬라이싱
// → "제 목숨을" → "제목숨을" → ["제","목숨을"] (정답 토큰 길이 기준)
// 단 중간에 단어 빠진 경우는 LCS로 처리
function tokenizeInp(inp, ansTokens){
  const flat = inp.replace(/\s/g,'');
  // flat을 ansTokens 길이 순서대로 잘라서 inp토큰 배열 생성
  const tokens=[];
  let pos=0;
  for(let i=0;i<ansTokens.length;i++){
    const len=ansTokens[i].length;
    if(pos>=flat.length) break;
    tokens.push(flat.slice(pos, pos+len));
    pos+=len;
  }
  return tokens;
}

// LCS 역추적 — 매칭된 (inp인덱스, ans인덱스) 쌍 배열 반환
function lcs(a, b){
  const m=a.length, n=b.length;
  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=1;i<=m;i++)
    for(let j=1;j<=n;j++)
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  const pairs=[];
  let i=m,j=n;
  while(i>0&&j>0){
    if(a[i-1]===b[j-1]){pairs.unshift([i-1,j-1]);i--;j--;}
    else if(dp[i-1][j]>dp[i][j-1])i--;
    else j--;
  }
  return pairs;
}

// diff: 정답 단어 기준으로 입력을 재슬라이싱해서 LCS 매칭
// → 띄어쓰기 무시 + 중간 단어 빠져도 밀림 없음
function buildDiff(inp, ans){
  const ansT = tokenizeAns(ans);
  // 입력 전체 공백 제거 후 정답 단어 길이 순서대로 슬라이싱
  const flat = inp.replace(/\s/g,'');
  const ansFlat = ans.replace(/\s/g,'');

  // 입력을 정답 단어 길이 배열로 슬라이싱 → 단어 단위 배열
  // 단 단어가 빠진 경우를 위해 LCS로 어느 정답 단어에 해당하는지 찾음
  // 방법: flat 전체를 ansT 각 단어 길이로 잘라서 "입력 토큰 후보" 배열 만들고
  //       그걸 ansT와 LCS 매칭
  const inpChunks=[]; // flat을 ansT 길이 순으로 자른 것
  let pos=0;
  for(let i=0;i<ansT.length;i++){
    const len=ansT[i].length;
    if(pos+len<=flat.length){
      inpChunks.push(flat.slice(pos,pos+len));
      pos+=len;
    } else if(pos<flat.length){
      inpChunks.push(flat.slice(pos));
      pos=flat.length;
    } else {
      break; // 입력이 짧아서 더 없음
    }
  }

  // LCS로 inpChunks와 ansT 매칭 (같은 길이 단어끼리만 비교)
  const pairs=lcs(inpChunks, ansT);

  let html='';
  let ai=0, ci=0;
  for(let pi=0;pi<=pairs.length;pi++){
    const ansEnd = pi<pairs.length ? pairs[pi][1] : ansT.length;
    const cEnd   = pi<pairs.length ? pairs[pi][0] : inpChunks.length;

    // 빠뜨린 정답 단어 → 초록
    while(ai<ansEnd){ html+='<span class="ins">'+ansT[ai]+'</span> '; ai++; }
    // 잘못 입력한 단어 → 취소선
    while(ci<cEnd){ html+='<span class="del">'+inpChunks[ci]+'</span> '; ci++; }
    // 매칭
    if(pi<pairs.length){
      html+='<span class="ok-ch">'+ansT[pairs[pi][1]]+'</span> ';
      ai++; ci++;
    }
  }
  return html;
}

function updateBtn(idx){
  const el=document.getElementById('rbtn'+idx);
  if(!el) return;
  const rg=RANGES[idx];
  const comp=idx===0?done.size:[...done].filter(i=>i>=rg.s&&i<=rg.e).length;
  el.querySelector('.done-num').textContent=comp;
  el.querySelector('.try-num').textContent=tries[idx];
}
function updateAllBtns(){ RANGES.forEach((_,i)=>updateBtn(i)); }

function setMode(m){
  document.body.className=m;
  document.getElementById('lLight').className='ctrl-label'+(m==='light'?' sel':'');
  document.getElementById('lDark').className='ctrl-label'+(m==='dark'?' sel':'');
}

function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr; }

function setRandMode(on){
  randMode=on;
  document.getElementById('lSeq').className='ctrl-label'+(on?'':' sel');
  document.getElementById('lRand').className='ctrl-label'+(on?' sel':'');
  // re-apply current range to reorder
  setRange(curRange);
}

function setRange(idx){
  curRange=idx;
  RANGES.forEach((_,i)=>{ document.getElementById('rbtn'+i).className='rbtn'+(i===idx?' sel':''); });
  const rg=RANGES[idx];
  const list=document.getElementById('list');
  // get all verse rows in range
  let indices=[];
  V.forEach((_,i)=>{
    const row=document.getElementById('row'+i);
    if(!row) return;
    const inRange=(i>=rg.s&&i<=rg.e);
    row.classList.toggle('hidden',!inRange);
    if(inRange) indices.push(i);
  });
  // if rand mode, shuffle DOM order of visible rows
  if(randMode){
    shuffle(indices);
    indices.forEach(i=>{ list.appendChild(document.getElementById('row'+i)); });
  } else {
    // restore sequential order
    const sorted=[...indices].sort((a,b)=>a-b);
    sorted.forEach(i=>{ list.appendChild(document.getElementById('row'+i)); });
  }
}

  if(!rv||!eb) return;
  rv.className='vrevealed'+(on?' show':'');
  eb.classList.toggle('on',on);

function check(i){
  const inp=document.getElementById('inp'+i);
  const fb=document.getElementById('fb'+i);
  const st=document.getElementById('st'+i);
  const val=inp.value;
  if(!val.trim()) return;
  const ans=full(V[i]);

  tries[0]++;
  tries[groupOf(i)]++;
  updateAllBtns();

  if(strip(val)===strip(ans)){
    inp.classList.remove('wrong'); inp.classList.add('correct');
    st.className='vstatus ok'; st.textContent='정답';
    fb.className='vfeedback'; fb.innerHTML='';
    done.add(i); updateAllBtns();
  } else {
    inp.classList.remove('correct'); inp.classList.add('wrong');
    st.className='vstatus ng';
    // 정확도: 동일한 방식으로 슬라이싱 후 LCS 매칭 수 / 정답 토큰 수
    const ansT2=tokenizeAns(ans);
    const flat2=val.replace(/\s/g,'');
    const chunks2=[];
    let pos2=0;
    for(let k=0;k<ansT2.length;k++){
      const len=ansT2[k].length;
      if(pos2+len<=flat2.length){chunks2.push(flat2.slice(pos2,pos2+len));pos2+=len;}
      else if(pos2<flat2.length){chunks2.push(flat2.slice(pos2));pos2=flat2.length;}
      else break;
    }
    const pct=Math.round(lcs(chunks2,ansT2).length/ansT2.length*100);
    st.textContent='오답 '+pct+'%';
    fb.className='vfeedback show';
    fb.innerHTML=buildDiff(val,ans);
  }
}

        '<span class="sep">|</span>'+
        '<span class="try-num">0</span> ↺'+
      '</span>';
    bar.appendChild(btn);
  });
}

function buildRows(){
  const list=document.getElementById('list');
  V.forEach((v,i)=>{
    revealState[i]=false;
    const row=document.createElement('div');
    row.className='verse-row'; row.id='row'+i;
    row.innerHTML=
      '<div class="verse-header">'+
        '<span class="vnum">'+(i+1)+'</span>'+
        '<input class="vinput" id="inp'+i+'" type="text" placeholder="구절과 본문 입력..." />'+
        '<button class="vbtn" onclick="check('+i+')">확인</button>'+
        '<button class="eyebtn" id="eb'+i+'" onclick="toggleReveal('+i+')">'+eyeOn+'</button>'+
        '<span class="vstatus" id="st'+i+'"></span>'+
      '</div>'+
      '<div class="vfeedback" id="fb'+i+'"></div>'+
      '<div class="vrevealed" id="rv'+i+'"><strong>'+v.r+'</strong>'+v.t+'</div>';
    list.appendChild(row);
    document.getElementById('inp'+i).addEventListener('keydown',function(e){
      if(e.key==='Enter'){e.preventDefault();check(i);}
    });
  });
}

buildRangeBar();
buildRows();
setRange(0);
</script>
</body>
</html>
