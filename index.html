<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCTRRORSH5B0jnrJ9F3D_vvoTl9lvgSHv4",
  authDomain: "poimen-bible.firebaseapp.com",
  projectId: "poimen-bible",
  storageBucket: "poimen-bible.firebasestorage.app",
  messagingSenderId: "585838718857",
  appId: "1:585838718857:web:20fae6aea43ec047447b58"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

// 전역 함수로 노출
window._fbSignIn = async function(){
  try{ await signInWithPopup(auth, provider); }
  catch(e){ console.error(e); }
};
window._fbSignOut = async function(){
  await signOut(auth);
};

// 데이터 저장 (채점할 때마다 호출) + 로컬 fbStats 즉시 반영
window._fbSaveStats = async function(verseIdx, isCorrect){
  // 1. 로컬 fbStats 즉시 업데이트
  if(!window.fbStats) window.fbStats = {};
  if(!window.fbStats[verseIdx]) window.fbStats[verseIdx] = {tries:0, correct:0};
  window.fbStats[verseIdx].tries += 1;
  if(isCorrect) window.fbStats[verseIdx].correct += 1;
  // 2. 약점 버튼 즉시 갱신
  if(window._fbApplyStats) window._fbApplyStats(window.fbStats);
  // 3. Firebase에 비동기 저장
  if(!currentUser) return;
  const ref = doc(db, 'users', currentUser.uid, 'stats', String(verseIdx));
  const data = {...window.fbStats[verseIdx]};
  await setDoc(ref, data);
};

// 데이터 불러오기
window._fbLoadStats = async function(){
  if(!currentUser) return null;
  const results = {};
  for(let i=0;i<60;i++){
    const ref = doc(db, 'users', currentUser.uid, 'stats', String(i));
    const snap = await getDoc(ref);
    if(snap.exists()) results[i] = snap.data();
  }
  return results;
};

// 로그인 상태 감지
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  const btn = document.getElementById('fbAuthBtn');
  const userInfo = document.getElementById('fbUserInfo');
  if(user){
    if(btn){ btn.textContent='로그아웃'; btn.onclick=window._fbSignOut; }
    if(userInfo){ userInfo.textContent=user.displayName||user.email; userInfo.style.display='inline'; }
    // 저장된 통계 불러오기
    const stats = await window._fbLoadStats();
    if(stats) window._fbApplyStats(stats);
  } else {
    if(btn){ btn.textContent='구글 로그인'; btn.onclick=window._fbSignIn; }
    if(userInfo){ userInfo.textContent=''; userInfo.style.display='none'; }
  }
});
</script>

// 정답 토큰화: 공백으로 쪼갬 (정답은 올바른 단어 경계)
// ============================================================
// 띄어쓰기 완전 무시 + 중간 빠진 단어 밀림 없음 + 초과 입력 처리
// 방법: 입력/정답 모두 공백 제거 → 글자 단위 LCS → 정답 단어 경계로 묶어서 표시
// ============================================================

function buildDiff(inp, ans){
  // 공백 완전 제거
  const A = inp.replace(/\s/g,'');
  const B = ans.replace(/\s/g,'');
  const m = A.length, n = B.length;

  // 글자 단위 LCS DP
  const dp = Array.from({length:m+1}, ()=>new Uint16Array(n+1));
  for(let i=1;i<=m;i++)
    for(let j=1;j<=n;j++)
      dp[i][j]=A[i-1]===B[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);

  // LCS 역추적 → pairsB[bi]=ai
  const pairsB=new Int32Array(n).fill(-1);
  {let i=m,j=n;
  while(i>0&&j>0){
    if(A[i-1]===B[j-1]){pairsB[j-1]=i-1;i--;j--;}
    else if(dp[i-1][j]>dp[i][j-1])i--;
    else j--;
  }}

  // 정답 단어 경계로 묶어서 표시
  const ansWords = ans.trim().split(/\s+/).filter(Boolean);
  let bPos=0, html='';
  // aPtr: 입력 A에서 다음 사용할 위치 (앞에서부터 순서대로 소비)
  let aPtr=0;

  for(const word of ansWords){
    const wFlat=word.replace(/\s/g,'');
    const wLen=wFlat.length;
    const bEnd=bPos+wLen;

    // 이 단어 B[bPos..bEnd) 의 매칭된 A 인덱스 수집
    const matched=[];
    for(let b=bPos;b<bEnd&&b<n;b++){
      if(pairsB[b]>=0) matched.push(pairsB[b]);
    }

    if(bEnd>n){
      // 입력이 짧아 없는 단어 → 초록
      html+='<span class="ins">'+wFlat+'</span> ';
    } else if(matched.length===wLen){
      // 완전 일치: 이 단어의 모든 글자가 매칭됨
      // → aPtr을 첫 매칭 위치까지 앞당겨서 혹시 앞에 잉여 입력 있으면 del 처리
      if(matched[0]>aPtr){
        html+='<span class="del">'+A.slice(aPtr,matched[0])+'</span>';
      }
      html+='<span class="ok-ch">'+wFlat+'</span> ';
      aPtr=matched[matched.length-1]+1;
    } else if(matched.length===0){
      // 하나도 안 맞음 → 빠진 단어 (초록)
      html+='<span class="ins">'+wFlat+'</span> ';
    } else {
      // 일부 매칭 → 틀린 단어
      const firstAi=matched[0];
      const lastAi=matched[matched.length-1];
      // aPtr~lastAi+1 사이가 이 단어에 입력된 실제 글자들
      const inpSlice=A.slice(aPtr, lastAi+1);
      html+='<span class="del">'+(inpSlice||wFlat)+'</span><span class="ins">'+wFlat+'</span> ';
      aPtr=lastAi+1;
    }
    bPos=bEnd;
  }

  // 정답 다 처리 후 남은 입력 글자 → 취소선
  if(aPtr<m){
    html+='<span class="del">'+A.slice(aPtr)+'</span>';
  }
  return html;
}

// English diff - word level for English
function buildDiffEn(inp, ans){
  const inpW=inp.trim().toLowerCase().split(/\s+/).filter(Boolean);
  const ansW=ans.trim().toLowerCase().split(/\s+/).filter(Boolean);
  const ansOrig=ans.trim().split(/\s+/).filter(Boolean);
  // LCS on words
  const m=inpW.length, n=ansW.length;
  const dp=Array.from({length:m+1},()=>new Int32Array(n+1));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=inpW[i-1]===ansW[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  const pairs=[];
  let i=m,j=n;
  while(i>0&&j>0){
    if(inpW[i-1]===ansW[j-1]){pairs.unshift([i-1,j-1]);i--;j--;}
    else if(dp[i-1][j]>dp[i][j-1])i--;else j--;
  }
  let html='',ai=0,ii=0;
  for(let pi=0;pi<=pairs.length;pi++){
    const ae=pi<pairs.length?pairs[pi][1]:n;
    const ie=pi<pairs.length?pairs[pi][0]:m;
    while(ai<ae){html+='<span class="ins">'+ansOrig[ai]+'</span> ';ai++;}
    while(ii<ie){html+='<span class="del">'+inpW[ii]+'</span> ';ii++;}
    if(pi<pairs.length){html+='<span class="ok-ch">'+ansOrig[pairs[pi][1]]+'</span> ';ai++;ii++;}
  }
  return html;
}

// 정확도: 공백제거 후 글자 단위 LCS 매칭 수 / 정답 글자 수 (캐시 적용)
const _pctCache=new Map();
function calcPct(inp, ans){
  if(lang==='en'){
    const iw=inp.trim().toLowerCase().split(/\s+/).filter(Boolean);
    const aw=ans.trim().toLowerCase().split(/\s+/).filter(Boolean);
    const m=iw.length,n=aw.length;
    if(n===0) return 0;
    const dp=Array.from({length:m+1},()=>new Int32Array(n+1));
    for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
      dp[i][j]=iw[i-1]===aw[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
    return Math.round(dp[m][n]/n*100);
  }
  const A=inp.replace(/\s/g,''), B=ans.replace(/\s/g,'');
  const key=A+'|'+B;
  if(_pctCache.has(key)) return _pctCache.get(key);
  const m=A.length, n=B.length;
  if(n===0) return 0;
  // 짧은 입력은 빠른 경로
  if(A===B){ _pctCache.set(key,100); return 100; }
  const dp=Array.from({length:m+1},()=>new Uint16Array(n+1));
  for(let i=1;i<=m;i++)
    for(let j=1;j<=n;j++)
      dp[i][j]=A[i-1]===B[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  const result=Math.round(dp[m][n]/n*100);
  if(_pctCache.size>200) _pctCache.clear(); // 메모리 관리
  _pctCache.set(key,result);
  return result;
}

// 장절 파싱 (예: "4:19" → {ch:4, vs:19})
function parseRef(ref){
  const parts=ref.split(' ');
  const cv=(parts[1]||'').replace('편','').split(':');
  const ch=parseInt(cv[0])||0;
  const vs=parseInt((cv[1]||'').split('-')[0])||0;
  return {ch,vs};
}

// 검색어로 구절 필터링 — 검색창 입력 내용을 해당 구절 입력칸에 자동 복사
let searchTimer=null;
function debounceSearch(q){
  // 검색 결과(필터링)는 즉시 — 입력칸 복사는 3초 후
  doSearchFilter(q);
  if(searchTimer) clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>doSearchCopy(q), 3000);
}

// 1단계: 즉시 실행 — 해당 구절만 필터링해서 보여줌 (복사 없음)
function doSearchFilter(q){
  const query=q.trim().replace(/\s+/g,' ');
  const qFlat=strip(query);
  const qLow=query.toLowerCase();
  clearBookHeaders();
  let count=0;
  V.forEach((v,i)=>{
    const row=document.getElementById('row'+i);
    const vnum=document.getElementById('vnum'+i);
    const inp=document.getElementById('inp'+i);
    if(!row) return;
    if(!query){
      row.classList.remove('hidden');
      if(vnum) vnum.textContent=(i+1);
      if(inp&&!inp.value){inp.placeholder='구절과 본문 입력...';}
      count++;
      return;
    }
    const haystack=(v.r+' '+v.t).toLowerCase();
    const haystackFlat=strip(v.r+v.t);
    const matches=haystack.includes(qLow)||v.r.toLowerCase().includes(qLow)||haystackFlat.includes(qFlat);
    if(matches){
      row.classList.remove('hidden');
      count++;
      if(vnum) vnum.innerHTML=(i+1);
    } else {
      row.classList.add('hidden');
      if(inp){inp.value='';inp.placeholder='구절과 본문 입력...';}
      if(vnum) vnum.textContent=(i+1);
    }
  });
  const countEl=document.getElementById('searchCount');
  if(!query) countEl.textContent='전체 60구절 표시 중';
  else if(count===0) countEl.textContent='검색 결과 없음';
  else countEl.textContent=count+'개 구절 검색됨 — 3초 후 입력칸에 자동 입력됩니다';
}

// 2단계: 3초 후 실행 — 입력칸에 복사 + 포커스
function doSearchCopy(q){
  const query=q.trim().replace(/\s+/g,' ');
  const qFlat=strip(query);
  const qLow=query.toLowerCase();
  if(!query) return;
  let firstMatchIdx=-1;
  V.forEach((v,i)=>{
    const inp=document.getElementById('inp'+i);
    const row=document.getElementById('row'+i);
    if(!inp||!row||row.classList.contains('hidden')) return;
    const haystack=(v.r+' '+v.t).toLowerCase();
    const haystackFlat=strip(v.r+v.t);
    const matches=haystack.includes(qLow)||v.r.toLowerCase().includes(qLow)||haystackFlat.includes(qFlat);
    if(matches){
      inp.value=query;
      if(firstMatchIdx===-1) firstMatchIdx=i;
    }
  });
  const countEl=document.getElementById('searchCount');
  countEl.textContent=document.querySelectorAll('.verse-row:not(.hidden)').length+'개 구절 검색됨 — 입력칸에 계속 이어서 쓰세요';
  if(firstMatchIdx>=0){
    const inp=document.getElementById('inp'+firstMatchIdx);
    if(inp){
      inp.focus();
      inp.setSelectionRange(inp.value.length, inp.value.length);
    }
  }
}

function doSearch(q){
  const query=q.trim().replace(/\s+/g,' ');
  const qFlat=strip(query);
  const qLow=query.toLowerCase();
  clearBookHeaders();

  let count=0;
  let firstMatchIdx=-1;

  V.forEach((v,i)=>{
    const row=document.getElementById('row'+i);
    const vnum=document.getElementById('vnum'+i);
    const inp=document.getElementById('inp'+i);
    if(!row) return;

    if(!query){
      row.classList.remove('hidden');
      if(vnum) vnum.textContent=(i+1);
      if(inp){inp.value='';inp.placeholder='구절과 본문 입력...';}
      count++;
      return;
    }

    const haystack=(v.r+' '+v.t).toLowerCase();
    const haystackFlat=strip(v.r+v.t);
    const matches=haystack.includes(qLow)||
                  v.r.toLowerCase().includes(qLow)||
                  haystackFlat.includes(qFlat);

    if(matches){
      row.classList.remove('hidden');
      count++;
      if(firstMatchIdx===-1) firstMatchIdx=i;
      if(vnum) vnum.innerHTML=(i+1);

      // 검색창 내용을 해당 구절 입력칸에 자동으로 넣어줌
      if(inp){
        inp.value=query;
        inp.placeholder='구절과 본문 입력...';
      }
    } else {
      row.classList.add('hidden');
      if(inp){inp.value='';inp.placeholder='구절과 본문 입력...';}
      if(vnum) vnum.textContent=(i+1);
    }
  });

  const countEl=document.getElementById('searchCount');
  if(!query){
    countEl.textContent='전체 60구절 표시 중';
  } else if(count===0){
    countEl.textContent='검색 결과 없음';
  } else {
    countEl.textContent=count+'개 구절 검색됨 — 입력칸에 계속 이어서 쓰세요';
  }

  // 매칭된 첫 구절 입력칸으로 포커스 (커서를 맨 끝으로)
  if(firstMatchIdx>=0){
    const inp=document.getElementById('inp'+firstMatchIdx);
    if(inp){
      setTimeout(()=>{
        inp.focus();
        inp.setSelectionRange(inp.value.length, inp.value.length);
      },50);
    }
  }
}

function applyRangeFilter(s, e){
  const list=document.getElementById('list');
  clearBookHeaders();
  let indices=[];
  V.forEach((_,i)=>{
    const row=document.getElementById('row'+i);
    if(!row) return;
    const inRange=(i>=s&&i<=e);
    row.classList.toggle('hidden',!inRange);
    if(inRange) indices.push(i);
  });

  if(sortMode==='rand'){
    shuffle(indices);
    indices.forEach(i=>list.appendChild(document.getElementById('row'+i)));
  } else if(sortMode==='book'){
    const bookMap={};
    indices.forEach(i=>{ const b=bookOf(V[i].r); if(!bookMap[b]) bookMap[b]=[]; bookMap[b].push(i); });
    let books=Object.keys(bookMap);
    if(bookSortMode==='bible'){
      books.sort((a,b)=>{ const ai=BIBLE_ORDER.indexOf(a),bi=BIBLE_ORDER.indexOf(b); return (ai===-1?999:ai)-(bi===-1?999:bi); });
    } else {
      books.sort((a,b)=>{ const d=bookMap[b].length-bookMap[a].length; return d!==0?d:bookMap[a][0]-bookMap[b][0]; });
    }
    books.forEach(book=>{
      const hdr=document.createElement('div'); hdr.className='book-header show';
      hdr.textContent=book+' ('+bookMap[book].length+'개)'; list.appendChild(hdr);
      [...bookMap[book]].sort((a,b)=>{ const pa=parseRef(V[a].r),pb=parseRef(V[b].r); return pa.ch!==pb.ch?pa.ch-pb.ch:pa.vs-pb.vs; })
        .forEach(i=>list.appendChild(document.getElementById('row'+i)));
    });
  } else {
    indices.sort((a,b)=>a-b);
    indices.forEach(i=>list.appendChild(document.getElementById('row'+i)));
  }
}

function setRange(idx){
  curRange=idx;
  RANGES.forEach((_,i)=>{ document.getElementById('rbtn'+i)&&(document.getElementById('rbtn'+i).className='rbtn'+(i===idx?' sel':'')); });
  const rg=RANGES[idx];
  applyRangeFilter(rg.s, rg.e);
  return; // applyRangeFilter handles everything
  const list=document.getElementById('list');
  clearBookHeaders();
  let indices=[];
  V.forEach((_,i)=>{
    const row=document.getElementById('row'+i);
    if(!row) return;
    const inRange=(i>=rg.s&&i<=rg.e);
    row.classList.toggle('hidden',!inRange);
    if(inRange) indices.push(i);
  });

  if(sortMode==='rand'){
    shuffle(indices);
    indices.forEach(i=>list.appendChild(document.getElementById('row'+i)));

  } else if(sortMode==='book'){
    // group by book
    const bookMap={};
    indices.forEach(i=>{
      const b=bookOf(V[i].r);
      if(!bookMap[b]) bookMap[b]=[];
      bookMap[b].push(i);
    });
    // sort books
    let books=Object.keys(bookMap);
    if(bookSortMode==='bible'){
      // 정경 순서로 정렬
      books.sort((a,b)=>{
        const ai=BIBLE_ORDER.indexOf(a), bi=BIBLE_ORDER.indexOf(b);
        return (ai===-1?999:ai)-(bi===-1?999:bi);
      });
    } else {
      // 개수 많은 순
      books.sort((a,b)=>{
        const diff=bookMap[b].length-bookMap[a].length;
        return diff!==0?diff:bookMap[a][0]-bookMap[b][0];
      });
    }
    books.forEach(book=>{
      const hdr=document.createElement('div');
      hdr.className='book-header show';
      hdr.textContent=book+' ('+bookMap[book].length+'개)';
      list.appendChild(hdr);
      // 권 안에서 장절 순으로 정렬
      const sorted=[...bookMap[book]].sort((a,b)=>{
        const pa=parseRef(V[a].r), pb=parseRef(V[b].r);
        return pa.ch!==pb.ch?pa.ch-pb.ch:pa.vs-pb.vs;
      });
      sorted.forEach(i=>list.appendChild(document.getElementById('row'+i)));
    });

  } else {
    // seq: restore original order

function expandBookAbbr(val){
  // "엡 4:13" 또는 "엡4:13" 형태에서 약어를 전체 이름으로 치환
  return val.replace(/^([가-힣]+)\s*(\d)/,function(m,abbr,rest){
    const full=BOOK_ABBR[abbr.trim()];
    return full ? full+' '+rest : m;
  });
}

function check(i){
  const inp=document.getElementById('inp'+i);
  const fb=document.getElementById('fb'+i);
  const st=document.getElementById('st'+i);
  // 약어 자동 변환
  const expanded=expandBookAbbr(inp.value);
  if(expanded!==inp.value) inp.value=expanded;
  const val=inp.value;
  if(!val.trim()) return;
  const ans=currentFull(i);

  tries[0]++;
  tries[groupOf(i)]++;
  updateAllBtns();

  const isPass = lang==='en'
    ? val.trim().toLowerCase().replace(/[.,;!?]/g,'')===ans.trim().toLowerCase().replace(/[.,;!?]/g,'')
    : calcPct(val,ans)===100;
  if(isPass){
    inp.classList.remove('wrong'); inp.classList.add('correct');
    st.className='vstatus ok'; st.textContent=lang==='en'?'Correct':'정답';
    // 정답일 때도 전체 구절 보여주기
    fb.className='vfeedback show';
    fb.style.color='';
    const v=V[i];
    const ansWords=ans.trim().split(/\s+/).filter(Boolean);
    fb.innerHTML=ansWords.map(w=>'<span class="ok-ch">'+w.replace(/\s/g,'')+'</span>').join(' ');
    done.add(i); updateAllBtns();
    // Firebase에 정답 저장
    if(window._fbSaveStats) window._fbSaveStats(i, true);
  } else {
    inp.classList.remove('correct'); inp.classList.add('wrong');
    st.className='vstatus ng';
    // 정확도: 동일한 슬라이싱 방식으로 계산
    const pct=calcPct(val,ans);
    st.textContent=(lang==='en'?'Accuracy ':'정확도 ')+pct+'%';
    fb.className='vfeedback show';
    fb.innerHTML=lang==='en'?buildDiffEn(val,ans):buildDiff(val,ans);
    // Firebase에 오답 저장
    if(window._fbSaveStats) window._fbSaveStats(i, false);
  }
}

// Firebase에서 불러온 통계 적용 (약점 구절 표시)
window._fbApplyStats = function(stats){
  window.fbStats = stats;
  // 번호 옆 표시 없이 약점 개수만 계산
  let weakCount = 0;
  V.forEach((_,v)=>{
    const s=stats[v];
    if(!s||s.tries<1) return;
    const pct=Math.round((s.tries-s.correct)/s.tries*100);
    // 번호 원래대로 복원
    const vnum=document.getElementById('vnum'+v);
    if(vnum) vnum.textContent=(v+1);
    if(pct>=60) weakCount++;
  });
  // 약점 버튼 업데이트
  const btn = document.getElementById('weakBtn');
  if(btn){
    if(weakCount>0){
      btn.style.display='inline-block';
      btn.textContent=lang==='en'?'⚠️ Weak':('⚠️ 약점 '+weakCount+'개');
    } else {
      btn.style.display='none';
    }
  }
};

// 음성 인식 (Web Speech API - 한국어)
let activeRecognition=null;
let activeMicIdx=-1;

function toggleMic(i){
  // 이미 같은 버튼 누른 경우 → 중지
  if(activeMicIdx===i && activeRecognition){
    activeRecognition.stop();
    return;
  }
  // 다른 mic 중지
  if(activeRecognition){ activeRecognition.stop(); }

  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    alert('이 브라우저는 음성 입력을 지원하지 않습니다.\nChrome 브라우저를 사용해 주세요.');
    return;
  }

  const inp=document.getElementById('inp'+i);
  const btn=document.getElementById('mic'+i);
  const rec=new SpeechRecognition();
  rec.lang=lang==='en'?'en-US':'ko-KR';
  rec.continuous=true;      // 연속 인식 — 말 중간에 끊기지 않음
  rec.interimResults=true;
  rec.maxAlternatives=3;    // 여러 후보 중 가장 정확한 것 선택

  activeRecognition=rec;
  activeMicIdx=i;

  rec.onstart=function(){
    // 준비 중 상태 (점선 마이크 + 느린 맥박)
    btn.classList.remove('listening');
    btn.classList.add('ready');
    btn.innerHTML=micReadySVG;
    btn.title=lang==='en'?'Getting ready... speak soon':'준비 중... 곧 말씀하세요';
    // 0.7초 후 → 녹음 중 상태 (X 마이크 + 빠른 맥박)
    setTimeout(()=>{
      if(btn.classList.contains('ready')){
        btn.classList.remove('ready');
        btn.classList.add('listening');
        btn.innerHTML=micOffSVG;
        btn.title=lang==='en'?'Recording... speak now':'녹음 중... 지금 말씀하세요';
      }
    }, 700);
  };

  rec.onerror=function(e){
    if(e.error==='no-speech'){
      // 음성 없음 — 그냥 종료
      if(activeRecognition) activeRecognition.stop();
    } else if(e.error!=='aborted'){
      console.warn('음성인식 오류:',e.error);
    }
  };

  let silenceTimer=null;

  rec.onresult=function(e){
    let finalText='', interimText='';
    const answerFlat=strip(full(V[i]));

    for(let k=0;k<e.results.length;k++){
      // maxAlternatives 중 정답과 가장 유사한 후보 선택
      let best=e.results[k][0].transcript;
      let bestScore=-1;
      for(let a=0;a<e.results[k].length;a++){
        const cand=convertSpeechToText(e.results[k][a].transcript);
        const candFlat=strip(cand);
        // 정답과 겹치는 글자 수로 점수 계산
        let score=0;
        const minLen=Math.min(candFlat.length, answerFlat.length);
        for(let c=0;c<minLen;c++) if(candFlat[c]===answerFlat[c]) score++;
        // confidence 가중치 추가
        score += (e.results[k][a].confidence||0)*5;
        if(score>bestScore){ bestScore=score; best=e.results[k][a].transcript; }
      }
      if(e.results[k].isFinal) finalText+=best;
      else interimText+=best;
    }
    const raw=finalText||interimText;
    inp.value=lang==='en'?raw.trim():convertSpeechToText(raw);

    // 음성 감지될 때마다 타이머 리셋 (4초 침묵 후 자동 종료)
    if(silenceTimer) clearTimeout(silenceTimer);
    silenceTimer=setTimeout(()=>{
      if(activeRecognition) activeRecognition.stop();
    }, 5000);
  };

  rec.onend=function(){
    if(silenceTimer) clearTimeout(silenceTimer);
    btn.classList.remove('listening','ready');
    btn.innerHTML=micSVG;
    btn.title=lang==='en'?'Voice input':'음성 입력';
    activeRecognition=null;
    activeMicIdx=-1;
    if(inp.value.trim()) check(i);
  };

  rec.start();
}

const BIBLE_CORRECTIONS = [
  // 책 이름 오인식
  ['마태 복음','마태복음'],['마태 복','마태복음'],['마태벅','마태복음'],

  ['요한 복음','요한복음'],['요한 일서','요한일서'],
  ['고린도 전서','고린도전서'],['고린도 후서','고린도후서'],
  ['데살로니가 전서','데살로니가전서'],['데살로니가 후서','데살로니가후서'],
  ['디모데 전서','디모데전서'],['디모데 후서','디모데후서'],
  ['빌립 보서','빌립보서'],['갈라디 아서','갈라디아서'],
  ['에베 소서','에베소서'],['베드로 전서','베드로전서'],
  ['히브리 서','히브리서'],['야고보 서','야고보서'],
  ['여호수 아','여호수아'],['이사 야','이사야'],
  ['예레미 야','예레미야'],['호세 아','호세아'],

  // 자주 틀리는 성경 단어
  ['하느님','하나님'],['하날님','하나님'],['하나닝','하나님'],
  ['예수께서','예수께서'],['예수 께서','예수께서'],
  ['이르시되','이르시되'],['이르시 되','이르시되'],
  ['하시니라','하시니라'],['하시 니라','하시니라'],
  ['하시니 라','하시니라'],
  ['하시고','하시고'],['이니라','이니라'],
  ['너희 는','너희는'],['너희 가','너희가'],['너희 를','너희를'],
  ['누구 든지','누구든지'],['무엇 이든지','무엇이든지'],
  ['그러므로 ','그러므로 '],
  ['볼지어 다','볼지어다'],['볼 지어다','볼지어다'],
  ['아버지 께서','아버지께서'],['아버지 께','아버지께'],

  // 숫자 오인식
  ['일 장','1장'],['이 장','2장'],['삼 장','3장'],['사 장','4장'],
  ['오 장','5장'],['육 장','6장'],['칠 장','7장'],['팔 장','8장'],['구 장','9장'],
];

function applyBibleCorrections(t){
  for(const [wrong, right] of BIBLE_CORRECTIONS){
    t=t.split(wrong).join(right);
  }
  return t;
}

function convertSpeechToText(text){
  let t=text;

  // 0단계: 성경 단어 교정
  t=applyBibleCorrections(t);

  // 1단계: 한글+아라비아 혼합 숫자 정규화
  // "십 9" → "19", "이십 3" → "23", "삼십 1" → "31"
  t=t.replace(/십\s*([1-9])/g, (m,n)=>(10+parseInt(n)).toString());
  t=t.replace(/이십\s*([1-9])/g, (m,n)=>(20+parseInt(n)).toString());
  t=t.replace(/삼십\s*([1-9])/g, (m,n)=>(30+parseInt(n)).toString());

  // 2단계: 순수 한글 숫자 → 아라비아 숫자 (장/절 앞)
  const korNum={
    '삼십':'30','이십구':'29','이십팔':'28','이십칠':'27','이십육':'26',
    '이십오':'25','이십사':'24','이십삼':'23','이십이':'22','이십일':'21','이십':'20',
    '십구':'19','십팔':'18','십칠':'17','십육':'16','십오':'15',
    '십사':'14','십삼':'13','십이':'12','십일':'11','십':'10',
    '구':'9','팔':'8','칠':'7','육':'6','오':'5','사':'4','삼':'3','이':'2','일':'1'
  };
  const korPattern=Object.keys(korNum).join('|');
  t=t.replace(new RegExp('('+korPattern+')(?=\s*[장절])', 'g'), m=>korNum[m]||m);

  // 3단계: "X장 Y절에서 Z절" → "X:Y-Z" (범위 먼저 처리)
  t=t.replace(/(\d+)\s*장\s*(\d+)\s*절\s*[에서부터~]\s*(\d+)\s*절/g,'$1:$2-$3');
  // "X장 Y절" → "X:Y"
  t=t.replace(/(\d+)\s*장\s*(\d+)\s*절/g,'$1:$2');
  // "X:Y에서 Z절" → "X:Y-Z" (이미 변환된 경우)
  t=t.replace(/(\d+:\d+)\s*[에서부터~]\s*(\d+)\s*절/g,'$1-$2');

  // 4단계: "콜론" → ":", 공백 정리
  t=t.replace(/콜론/g,':');
  t=t.replace(/(\d)\s*:\s*(\d)/g,'$1:$2');

  // 5단계: 단독 "말씀" 제거 (말씀하시되, 말씀하여 등 복합어는 유지)
  // "말씀" 뒤에 공백이나 문장 끝이 오는 경우만 제거 (단독 단어일 때만)
  // 장절 뒤: "4:19 말씀" → "4:19"
  t=t.replace(/(\d+:\d+[-\d]*)\s+말씀(?=\s|$)/g,'$1');
  // 장절 변환 전: "4장 19절 말씀" → "4:19"
  t=t.replace(/(\d+)\s*장\s*(\d+)\s*절\s+말씀(?=\s|$)/g,'$1:$2');
  // 문장 맨 앞 단독 "말씀 " (뒤에 공백 있어야 함 — "말씀하시되"와 구별)
  t=t.replace(/^말씀(?=\s)/,'');
  // 문장 맨 끝 단독 "말씀" (앞에 공백 있어야 함)
  t=t.replace(/(?<=\s)말씀$/,'');

  return t.trim();
}

function applyWeakFilter(){
  clearBookHeaders();
  let count = 0;
  V.forEach((_,i)=>{
    const row = document.getElementById('row'+i);
    if(!row) return;
    const s = window.fbStats[i];
    if(s && s.tries >= 2){
      const wrongPct = Math.round((s.tries - s.correct) / s.tries * 100);
      if(wrongPct >= 60){
        row.classList.remove('hidden');
        count++;
        return;

    }
    row.classList.add('hidden');
  });
}

      const sb=document.createElement('span');
      sb.className='rbtn';
      sb.id='subBtn'+realGi+'_'+si;
      sb.style.cssText='flex:1;text-align:center;min-width:52px;';
      sb.onclick=(e)=>{ e.stopPropagation(); setRangeBySub(sub.s,sub.e,realGi,si); };
      sb.innerHTML=
        '<span class="rtop" style="font-size:11px;">'+sub.label+'</span>'+
        '<span class="rbot">'+
          '<span class="done-num" id="sdone'+realGi+'_'+si+'">0</span> ✓'+
          '<span class="sep">|</span>'+
          '<span class="try-num" id="stry'+realGi+'_'+si+'">0</span> ↺'+
        '</span>';
      subRow.appendChild(sb);
    });
    box.appendChild(subRow);
    bar.appendChild(box);
  });
  // 초기 스타일 적용
  applyGroupBoxStyle();
}

function applyGroupBoxStyle(){
  const isDark=document.body.classList.contains('dark');
  const selColor=isDark?'#e0e0da':'#1a1a1a';
  const defColor=isDark?'#444':'#d0d0c8';
  const bgSel=isDark?'#2a2a2a':'#fff';
  const bgDef='transparent';
  const lblBg=isDark?'#181818':'#f5f5f0';

  GROUPS.slice(1).forEach((grp,gi)=>{
    const realGi=gi+1;
    const box=document.getElementById('grpBtn'+realGi);
    if(!box) return;
    const isActive=box.classList.contains('active');
    box.style.borderColor=isActive?selColor:defColor;
    const lbl=box.querySelector('span');
    if(lbl){
      lbl.style.color=isActive?selColor:(isDark?'#888':'#999');
      lbl.style.background=lblBg;
    }
  });
}

function buildRows(){
  const list=document.getElementById('list');
  V.forEach((v,i)=>{
    revealState[i]=false;
    const row=document.createElement('div');
    row.className='verse-row'; row.id='row'+i;
    row.innerHTML=
      '<div class="verse-header">'+
        '<span class="vnum" id="vnum'+i+'">'+(i+1)+'</span>'+
        '<input class="vinput" id="inp'+i+'" type="text" placeholder="구절과 본문 입력..." />'+
        '<button class="vbtn" onclick="check('+i+')">✓</button>'+
        '<button class="eyebtn" id="eb'+i+'" onclick="toggleReveal('+i+')">'+eyeOn+'</button>'+
        '<button class="eyebtn" onclick="resetRow('+i+')" title="이 칸 초기화">'+resetSVG+'</button>'+
        '<button class="micbtn" id="mic'+i+'" onclick="toggleMic('+i+')" title="음성 입력">'+micSVG+'</button>'+
        '<span class="vstatus" id="st'+i+'"></span>'+
      '</div>'+
      '<div class="vfeedback" id="fb'+i+'"></div>'+
      '<div class="vrevealed" id="rv'+i+'"><strong>'+v.r+'</strong> '+v.t+'</div>';
    list.appendChild(row);
    (function(rowIdx){
      const el=document.getElementById('inp'+rowIdx);
      el.addEventListener('keydown',function(e){
        if(e.key==='Enter'){e.preventDefault();check(rowIdx);}
        if(e.key==='Tab'){
          e.preventDefault();
          e.stopPropagation();
          const isShift=e.shiftKey;
          const visibleRows=Array.from(document.querySelectorAll('.verse-row:not(.hidden)'));
          const curRow=document.getElementById('row'+rowIdx);
          const curRowIdx=visibleRows.indexOf(curRow);
          const targetRow=isShift?visibleRows[curRowIdx-1]:visibleRows[curRowIdx+1];
          if(targetRow){
            const targetInp=targetRow.querySelector('.vinput');
            if(targetInp){
              // requestAnimationFrame으로 현재 이벤트 처리 완전히 끝난 후 이동
              requestAnimationFrame(()=>{
                targetInp.focus();
                targetInp.setSelectionRange(targetInp.value.length,targetInp.value.length);
                targetRow.scrollIntoView({block:'nearest',behavior:'instant'});
              });
            }
          }
        }
      });
    })(i);
  });
}

buildRangeBar();
buildRows();
setRangeByGroup(0);
applyLangToggleStyle();
</script>
</body>
